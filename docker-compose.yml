# docker-compose.yml
# GTM UAE Partner Pipeline — deployment stack
#
# Services
# --------
#   postgres   — PostgreSQL 16 database (auto-initialises schema on first start)
#   backend    — FastAPI web server (voice agent, Ozonetel stream, all API routes) — always running
#   caddy      — reverse proxy, gives you a stable wss://yourdomain.com with auto TLS
#   pipeline   — Python pipeline runner, one-shot batch jobs (graph.py, migrations)
#
# Usage
# -----
#   1. Copy .env.example to .env and fill in credentials.
#   2. Place the Excel file at the repo root as:
#         "GTM UAE_ Track 1 & 2 Db.xlsx"
#   3. Point your domain's DNS A record at this server's public IP.
#   4. Edit Caddyfile — replace "yourdomain.com" with your real domain.
#   5. Start everything:
#         docker compose up -d
#      (backend + caddy come up with restart: always — survive crashes/reboots)
#   6. Run the migration to load Excel → Postgres (one-shot):
#         docker compose run --rm pipeline python scripts/migrate_excel_to_db.py
#   7. Ozonetel WebSocket URL to hand over:
#         wss://yourdomain.com/ozonetel/stream
#   8. To reset the DB entirely (drops all data):
#         docker compose down -v

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gtm_uae_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-gtm_uae}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Persist data across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Auto-run DDL on first startup (only when volume is empty)
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-gtm_uae}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── FastAPI backend (voice agent, Ozonetel stream, all API routes) ─────────
  # This is the persistent web server — separate from the `pipeline` service
  # below, which only runs one-shot batch scripts (graph.py, migrations) and
  # exits. Ozonetel/Twilio need something that stays running and reachable
  # 24/7, which `pipeline` was never set up to provide.
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gtm_uae_backend
    restart: always
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # ── Caddy reverse proxy ──────────────────────────────────────────────────
  # Gives you a STABLE public wss://yourdomain.com URL with automatic,
  # auto-renewing TLS — unlike ngrok, this doesn't change on every restart.
  # This is what makes the Ozonetel WebSocket URL "always up": Ozonetel
  # points at your domain, not at an ephemeral tunnel URL.
  caddy:
    image: caddy:2-alpine
    container_name: gtm_uae_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  # ── Pipeline runner (one-shot batch jobs — unchanged) ───────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gtm_uae_pipeline
    env_file: .env
    environment:
      # Override DB_HOST so the pipeline container reaches the postgres service
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount repo so code changes reflect immediately (no rebuild needed)
      - .:/app
      # Mount Excel file separately if it lives outside the repo
      # - /path/to/your/excel:/app/data/partners.xlsx:ro
    # Default command — override with: docker compose run pipeline python <script>
    command: python graph.py

volumes:
  postgres_data:
    name: gtm_uae_postgres_data
  caddy_data:
    name: gtm_uae_caddy_data
  caddy_config:
    name: gtm_uae_caddy_config  